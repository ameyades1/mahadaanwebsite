            - text: provides the means to sustain oneself.
          - generic [ref=e42]:
            - strong [ref=e43]: Guru Daan
            - text: transcends both—because the Guru does not merely teach; He liberates. The Guru removes ignorance, suffering, and karmic limitations, guiding seekers towards self-realisation, abundance, and ultimate freedom.
