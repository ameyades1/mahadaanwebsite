          - text: "\"अन्नदानं परं दानं विद्यादानमतः परम्।"
          - text: अन्नेन क्षणिका तृप्तिर्यावज्जीवं च विद्यया॥"
        - text: (Sanskrit Subhashit)
        - paragraph [ref=e34]: "\"Food donation is the greatest of all, but the donation of knowledge is even higher. Food satisfies hunger temporarily, while knowledge nourishes a person for a lifetime.\""
      - generic [ref=e35]:
        - paragraph [ref=e36]: This profound wisdom holds even greater significance when applied to the Guru.
