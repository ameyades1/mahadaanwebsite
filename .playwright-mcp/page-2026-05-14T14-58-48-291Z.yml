      - generic [ref=e39]:
        - generic [ref=e40]:
          - heading "Mahadaan (महादान)" [level=3] [ref=e41]
          - paragraph [ref=e42]: "\"A Sacred Offering That Lives Beyond You\""
          - paragraph [ref=e43]:
            - text: Mahadaan means
            - strong [ref=e44]: "\"Great Charity\""
            - text: — a selfless act of giving performed with pure intention, without expectation, for the welfare of society. In our spiritual tradition, charity is not merely help — it is
            - strong [ref=e45]: Dharma
            - text: . It purifies the giver and uplifts the receiver.
          - paragraph [ref=e46]:
            - text: When Mahadaan is performed in the presence of a
            - strong [ref=e47]: Jivit Guru
            - text: (living spiritual master), it becomes a divine blessing in action. Under the enlightened guidance of
            - strong [ref=e48]: Acharya Upendra Ji
            - text: ", every offering reaches the right hands, at the right time, for the right purpose."
          - generic [ref=e49]:
            - paragraph [ref=e50]: "The Guru Transforms:"
            - list [ref=e51]:
              - listitem [ref=e52]:
                - text: ✦
                - strong [ref=e53]: Charity
                - text: into Seva (selfless service)
              - listitem [ref=e54]:
                - text: ✦
                - strong [ref=e55]: Donation
                - text: into Devotion (spiritual offering)
              - listitem [ref=e56]:
                - text: ✦
                - strong [ref=e57]: Contribution
                - text: into Sadhana (spiritual practice)
        - generic [ref=e58]:
          - heading "The Truth of Giving" [level=3] [ref=e59]
          - paragraph [ref=e60]:
            - strong [ref=e61]: Mahadaan is not about how much you give.
            - text: It is about purity of intention, compassion in the heart, and selflessness in action.
          - paragraph [ref=e62]: Even a small act done with sincere feeling becomes Mahadaan. True giving transforms not just the receiver—it transforms the giver. It softens the heart, removes fear of loss, awakens gratitude, and replaces ego with humility.
          - paragraph [ref=e63]:
            - text: "\"At the end of life, wealth stays here. Status stays here. Possessions stay here."
            - strong [ref=e64]: Only karma travels forward.
            - text: "\""
          - paragraph [ref=e65]: Mahadaan ensures that what travels with your soul is light — not burden.
